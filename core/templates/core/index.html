{% extends "base.html" %}
{% load static %}
{% block content %}

<section class="min-vh-100 d-flex align-items-center" style="background-color: #1c2333;">
    <div class="container">
        <div class="row align-items-center">

            <!-- Left: Text -->
            <div class="col-lg-7 col-md-12 text-white">
                <p class="text-success fw-semibold mb-1" style="letter-spacing: 2px; font-size: 1rem;">WELCOME TO MY
                    PORTFOLIO</p>
                <h1 class="display-4 fw-bold mb-2">Hi, I am <span class="text-success">Sujal Limbu</span></h1>
                <h4 class="text-secondary mb-4">Software Developer</h4>
                <p class="text-secondary mb-4" style="max-width: 500px; line-height: 1.8;">
                    Passionate about building clean, efficient, and user-friendly applications.
                    I turn ideas into reality through code.
                </p>
                <div class="d-flex gap-3">
                    <a href="{% url 'projects' %}" class="btn btn-success px-4 py-2">View Projects</a>
                    <a href="{% url 'contact' %}" class="btn btn-outline-light px-4 py-2">Contact Me</a>
                </div>
            </div>

            <!-- Right: Profile Image placeholder -->
            <div class="col-lg-5 col-md-12 text-center mt-5 mt-lg-0">
                <img src="{% static 'images/Me.jpeg' %}" alt="me" class="rounded-circle"
                    style="width: 280px; height: 280px; object-fit: cover; border: 4px solid #198754;">
            </div>

        </div>
    </div>
</section>

{% endblock content %}
